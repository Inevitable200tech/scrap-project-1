<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scraper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8 font-sans">
    
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 border-b border-gray-800 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-white mb-2">📼 Video Vault</h1>
                <p class="text-gray-400">Manage and play your scraped R2 videos.</p>
            </div>
            <button onclick="loadVideos()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded transition">
                ↻ Refresh
            </button>
        </header>

        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-gray-500 animate-pulse">Loading videos...</p>
        </div>
    </div>

    <script>
        async function loadVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<p class="text-gray-500 animate-pulse">Loading videos...</p>';

            try {
                const response = await fetch('/api/videos');
                const data = await response.json();

                // Check if data is actually an array
                if (!Array.isArray(data)) {
                    throw new Error(data.error || "Server returned an object instead of a list.");
                }

                if (data.length === 0) {
                    grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">No videos found in the database yet.</p>';
                    return;
                }

                grid.innerHTML = data.map(video => {
                    // Use playUrl (the Signed URL) provided by your main.ts
                    const videoUrl = video.playUrl;
                    
                    return `
                        <div class="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border border-gray-700 hover:border-indigo-500 transition duration-300">
                            <video controls class="w-full aspect-video bg-black" preload="metadata">
                                <source src="${videoUrl}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                            
                            <div class="p-5">
                                <h3 class="font-bold text-lg mb-2 text-white truncate" title="${video.title}">
                                    ${video.title || 'Untitled Stream'}
                                </h3>
                                
                                <div class="flex flex-col gap-1 text-xs text-gray-400 font-mono mb-4">
                                    <p class="truncate text-indigo-400"><span class="text-gray-500">Status:</span> ${video.type || 'processed'}</p>
                                    <p class="truncate"><span class="text-gray-500">Key:</span> ${video.r2Key}</p>
                                </div>

                                <div class="flex gap-2 mt-4">
                                    <a href="${videoUrl}" target="_blank" class="flex-1 text-center bg-indigo-600 hover:bg-indigo-500 text-white py-2 rounded font-semibold transition text-sm">
                                        Download / Open Link
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("Dashboard Error:", error);
                grid.innerHTML = `<div class="col-span-full bg-red-900/20 border border-red-500 p-4 rounded text-red-400">
                    <strong>Error:</strong> ${error.message}
                </div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadVideos);
    </script>
</body>
</html>
