<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Vault | Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .progress-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .input-glow:focus {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="bg-[#0b0f1a] text-gray-200 min-h-screen selection:bg-indigo-500/30">

    <!-- Auth Overlay -->
    <div id="lock-screen" class="fixed inset-0 bg-[#0b0f1a] z-50 flex items-center justify-center p-4">
        <div class="glass-panel p-8 rounded-3xl w-full max-w-md text-center shadow-2xl">
            <div class="w-20 h-20 bg-indigo-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h2 class="text-3xl font-bold mb-2 text-white">Access Vault</h2>
            <p class="text-gray-400 mb-8 text-sm">Enter your secure PIN to continue</p>
            <input type="password" id="admin-pin" placeholder="••••" autocomplete="off"
                   class="w-full bg-gray-900/50 border border-gray-800 rounded-2xl px-4 py-4 mb-4 focus:outline-none input-glow text-center text-2xl tracking-[1em] text-white">
            <button onclick="unlock()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg shadow-indigo-600/20">
                Unlock System
            </button>
            <p id="lock-error" class="text-red-400 mt-4 hidden text-sm font-medium"></p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-5xl mx-auto px-4 py-8 md:py-12">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
            <div>
                <h1 class="text-4xl font-extrabold text-white tracking-tight flex items-center gap-3">
                    <span class="bg-indigo-600 p-2 rounded-xl">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                    </span>
                    Video Vault
                </h1>
                <p class="text-gray-500 mt-1 font-medium">Remote Video Scraper & Uploader</p>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="logout()" class="px-4 py-2 text-gray-500 hover:text-red-400 transition-colors font-medium text-sm">
                    Lock Session
                </button>
                <div class="h-4 w-px bg-gray-800"></div>
                <div id="connection-status" class="flex items-center gap-2 text-xs font-semibold text-emerald-500 bg-emerald-500/10 px-3 py-1.5 rounded-full border border-emerald-500/20">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    SYSTEM ONLINE
                </div>
            </div>
        </header>

        <!-- Downloader UI -->
        <div class="glass-panel rounded-[2rem] p-8 md:p-10 mb-12 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 p-8 opacity-10">
                <svg class="w-32 h-32 text-white" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path>
                </svg>
            </div>
            
            <div class="relative z-10">
                <h2 class="text-2xl font-bold text-white mb-6">New Download</h2>
                <div class="space-y-4">
                    <div class="relative">
                        <input type="text" id="video-url" placeholder="Paste video URL here..." 
                               class="w-full bg-gray-900/50 border border-gray-800 rounded-2xl px-6 py-5 pr-32 focus:outline-none input-glow text-white placeholder-gray-600 transition-all">
                        <button onclick="startDownload()" id="download-btn"
                                class="absolute right-2 top-2 bottom-2 bg-indigo-600 hover:bg-indigo-500 text-white px-6 rounded-xl font-bold transition-all flex items-center gap-2">
                            <span>Scrape</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex-1">
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Custom Title (Optional)</label>
                            <input type="text" id="video-title" placeholder="Enter title override" 
                                   class="w-full bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-3 focus:outline-none input-glow text-white text-sm">
                        </div>
                        <div class="md:w-1/3 flex items-end">
                            <p class="text-xs text-gray-500 mb-3 italic">Supported: Various video hosting platforms via Scraping module.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Jobs Section -->
        <div class="space-y-6">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-bold text-white flex items-center gap-2">
                    Recent Activity
                    <span id="job-count" class="bg-gray-800 text-gray-400 text-xs px-2 py-1 rounded-md">0</span>
                </h3>
                <button onclick="loadJobs()" class="text-indigo-400 hover:text-indigo-300 text-sm font-semibold transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    Refresh
                </button>
            </div>

            <div id="jobs-list" class="grid gap-4">
                <!-- Skeleton Loader -->
                <div class="glass-panel p-6 rounded-2xl animate-pulse flex items-center gap-4">
                    <div class="w-12 h-12 bg-gray-800 rounded-xl"></div>
                    <div class="flex-1 space-y-2">
                        <div class="h-4 bg-gray-800 rounded w-1/4"></div>
                        <div class="h-3 bg-gray-800 rounded w-1/2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jobs = [];
        let pollIntervals = {};

        // ── Auth ───────────────────────────────────────────────────────────
        async function unlock() {
            const pin = document.getElementById('admin-pin').value;
            const errorEl = document.getElementById('lock-error');
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                if (res.ok) {
                    localStorage.setItem('vault_pin', pin);
                    document.getElementById('lock-screen').classList.add('hidden');
                    loadJobs();
                } else {
                    errorEl.innerText = "Invalid PIN. Access Denied.";
                    errorEl.classList.remove('hidden');
                }
            } catch (err) {
                errorEl.innerText = "Server unreachable.";
                errorEl.classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.removeItem('vault_pin');
            location.reload();
        }

        // ── Jobs Management ────────────────────────────────────────────────
        async function loadJobs() {
            const pin = localStorage.getItem('vault_pin');
            if (!pin) return;

            try {
                const response = await fetch('/api/scrape/jobs', {
                    headers: { 'Authorization': pin }
                });

                if (response.status === 403 || response.status === 401) {
                    logout();
                    return;
                }

                jobs = await response.json();
                // Sort by date desc
                jobs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                renderJobs();
                
                // Start polling for active jobs
                jobs.forEach(job => {
                    if (['pending', 'scraping', 'storing'].includes(job.status)) {
                        startPolling(job.jobId);
                    }
                });
            } catch (error) {
                console.error("Failed to load jobs", error);
            }
        }

        function renderJobs() {
            const list = document.getElementById('jobs-list');
            const count = document.getElementById('job-count');
            count.innerText = jobs.length;

            if (jobs.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 bg-gray-900/20 rounded-3xl border border-dashed border-gray-800">
                        <div class="text-gray-600 mb-2">No download history found.</div>
                        <div class="text-gray-700 text-xs uppercase tracking-widest">Start by pasting a URL above.</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = jobs.map(job => createJobCard(job)).join('');
        }

        function createJobCard(job) {
            const isProcessing = ['pending', 'scraping', 'storing'].includes(job.status);
            const isFailed = job.status === 'failed';
            const isDone = job.status === 'done';
            
            const progress = job.progress?.percent || 0;
            const stage = job.progress?.stage || 'Initializing';
            
            let statusColor = 'text-gray-400';
            let statusIcon = '';
            let bgGlow = '';

            if (isProcessing) {
                statusColor = 'text-indigo-400';
                statusIcon = '<div class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></div>';
                bgGlow = 'border-indigo-500/20 shadow-lg shadow-indigo-500/5';
            } else if (isFailed) {
                statusColor = 'text-red-400';
                statusIcon = '<div class="w-2 h-2 bg-red-500 rounded-full"></div>';
                bgGlow = 'border-red-500/10';
            } else if (isDone) {
                statusColor = 'text-emerald-400';
                statusIcon = '<div class="w-2 h-2 bg-emerald-500 rounded-full"></div>';
                bgGlow = 'border-emerald-500/10';
            }

            return `
                <div id="job-${job.jobId}" class="glass-panel p-5 rounded-2xl border ${bgGlow} transition-all duration-500">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-xl bg-gray-800 flex items-center justify-center shrink-0">
                            ${isProcessing ? `
                                <svg class="w-6 h-6 text-indigo-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                </svg>
                            ` : isDone ? `
                                <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                            ` : `
                                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            `}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-bold text-white truncate text-base pr-4" title="${job.url}">${job.url}</h4>
                                <span class="text-[10px] text-gray-500 uppercase tracking-tighter shrink-0 mt-1">${new Date(job.createdAt).toLocaleTimeString()}</span>
                            </div>
                            
                            <div class="flex items-center gap-3 mb-3">
                                <div class="flex items-center gap-1.5 ${statusColor} text-[10px] font-bold uppercase tracking-widest">
                                    ${statusIcon}
                                    ${job.status}
                                </div>
                                <div class="h-1 w-1 bg-gray-800 rounded-full"></div>
                                <div class="text-[10px] text-gray-500 font-medium uppercase tracking-widest">
                                    ${stage}
                                </div>
                            </div>

                            ${isProcessing ? `
                                <div class="w-full bg-gray-900 h-1.5 rounded-full overflow-hidden">
                                    <div id="progress-${job.jobId}" class="progress-bar bg-indigo-500 h-full shadow-[0_0_10px_rgba(99,102,241,0.5)]" style="width: ${progress}%"></div>
                                </div>
                            ` : isFailed ? `
                                <div class="text-xs text-red-400 bg-red-400/5 p-3 rounded-lg border border-red-400/10">
                                    <span class="font-bold uppercase tracking-tighter">Error:</span> ${job.error || 'Unknown failure'}
                                </div>
                            ` : `
                                <div class="text-xs text-emerald-400 bg-emerald-400/5 p-3 rounded-lg border border-emerald-400/10 flex items-center justify-between">
                                    <span class="truncate pr-4">Successfully uploaded to main instance.</span>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        // ── Actions ────────────────────────────────────────────────────────
        async function startDownload() {
            const urlInput = document.getElementById('video-url');
            const titleInput = document.getElementById('video-title');
            const btn = document.getElementById('download-btn');
            
            const url = urlInput.value.trim();
            const title = titleInput.value.trim();

            if (!url) return;

            // Simple URL validation
            if (!url.startsWith('http')) {
                alert("Please enter a valid URL starting with http:// or https://");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, title })
                });

                if (response.ok) {
                    const data = await response.json();
                    urlInput.value = '';
                    titleInput.value = '';
                    
                    // Add new job to local state immediately
                    const newJob = {
                        jobId: data.jobId,
                        url: url,
                        status: 'pending',
                        createdAt: new Date().toISOString(),
                        progress: { percent: 5, stage: 'queuing' }
                    };
                    jobs.unshift(newJob);
                    renderJobs();
                    startPolling(data.jobId);
                } else {
                    const error = await response.json();
                    alert(`Error: ${error.error || 'Failed to start download'}`);
                }
            } catch (error) {
                alert("Network error. Check connection.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Scrape</span> <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>';
            }
        }

        function startPolling(jobId) {
            if (pollIntervals[jobId]) return;

            pollIntervals[jobId] = setInterval(async () => {
                try {
                    const response = await fetch(`/api/scrape/status/${jobId}`);
                    if (!response.ok) {
                        clearInterval(pollIntervals[jobId]);
                        delete pollIntervals[jobId];
                        return;
                    }

                    const data = await response.json();
                    
                    // Update local state
                    const idx = jobs.findIndex(j => j.jobId === jobId);
                    if (idx !== -1) {
                        jobs[idx] = { ...jobs[idx], ...data };
                        
                        // Update UI partially if possible to avoid full re-render
                        const card = document.getElementById(`job-${jobId}`);
                        if (card) {
                            const progBar = document.getElementById(`progress-${jobId}`);
                            if (progBar && data.progress) {
                                progBar.style.width = `${data.progress.percent}%`;
                            }
                            
                            // If status changed to something final, re-render all to show success/fail state
                            if (['done', 'failed'].includes(data.status)) {
                                clearInterval(pollIntervals[jobId]);
                                delete pollIntervals[jobId];
                                renderJobs();
                            }
                        } else {
                            // If card not in DOM for some reason, re-render
                            renderJobs();
                        }
                    }
                } catch (e) {
                    console.error("Polling error", e);
                }
            }, 2000);
        }

        // ── Init ───────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            const pin = localStorage.getItem('vault_pin');
            if (pin) {
                document.getElementById('lock-screen').classList.add('hidden');
                loadJobs();
            }
        });
    </script>
</body>
</html>
